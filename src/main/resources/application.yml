server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-interview-platform-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/ai_interview_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-change-me-please-32-chars-min}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  ai:
    provider: ${AI_PROVIDER:mock}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}

ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}

openapi:
  title: AI Interview Platform Backend API
  description: API documentation for the AI interview practice platform backend.
  version: 0.0.1
