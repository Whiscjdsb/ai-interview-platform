server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-interview-platform-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    # Use a long random value in production. The application derives a signing key from this value.
    secret: ${JWT_SECRET:dev-jwt-secret-change-me-please-32-chars-min}
    # Token lifetime in seconds.
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  ai:
    # Supported values: mock, deepseek. Reserved extension value: openai.
    provider: ${AI_PROVIDER:mock}
    # Generic AI key placeholder. Do not commit real keys.
    api-key: ${AI_API_KEY:}
    deepseek:
      # DeepSeek integration reads the key from this environment variable.
      api-key: ${DEEPSEEK_API_KEY:}
    openai:
      # Future OpenAI integration reads the key from this environment variable.
      api-key: ${OPENAI_API_KEY:}

ai:
  deepseek:
    # Alias used by DeepSeekAiService. Do not commit real keys.
    api-key: ${DEEPSEEK_API_KEY:}

openapi:
  title: AI Interview Platform Backend API
  description: API documentation for the AI interview practice platform backend.
  version: 0.0.1
