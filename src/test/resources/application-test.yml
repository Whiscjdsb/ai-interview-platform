spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ai_interview_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
      data-locations: classpath:data-test.sql
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: test-jwt-secret-change-me-please-32-chars-min
    expiration-seconds: 3600
  ai:
    provider: mock

openapi:
  title: AI Interview Platform Backend API
  description: API documentation for tests.
  version: 0.0.1-test
